openapi: 3.1.0
info:
  description: Access control API for Hindsight memory server
  title: Hindclaw API
  version: 0.1.0
servers:
- url: /
paths:
  /ext/hindclaw/users:
    get:
      operationId: list_users
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Users
    post:
      operationId: create_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create User
  /ext/hindclaw/users/{user_id}:
    delete:
      operationId: delete_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete User
    get:
      operationId: get_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get User
    put:
      operationId: update_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update User
  /ext/hindclaw/users/{user_id}/channels:
    get:
      operationId: list_user_channels
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ChannelResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List User Channels
    post:
      operationId: add_user_channel
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChannelRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Add User Channel
  /ext/hindclaw/users/{user_id}/channels/{provider}/{sender_id}:
    delete:
      operationId: remove_user_channel
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      - explode: false
        in: path
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: simple
      - explode: false
        in: path
        name: sender_id
        required: true
        schema:
          title: Sender Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Remove User Channel
  /ext/hindclaw/groups:
    get:
      operationId: list_groups
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GroupSummaryResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Groups
    post:
      operationId: create_group
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupSummaryResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Group
  /ext/hindclaw/groups/{group_id}:
    delete:
      operationId: delete_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Group
    get:
      operationId: get_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Group
    put:
      operationId: update_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Group
  /ext/hindclaw/groups/{group_id}/members:
    get:
      operationId: list_group_members
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GroupMemberResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Group Members
    post:
      operationId: add_group_member
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembershipConfirmation'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Add Group Member
  /ext/hindclaw/groups/{group_id}/members/{user_id}:
    delete:
      operationId: remove_group_member
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Remove Group Member
  /ext/hindclaw/banks/{bank_id}/permissions:
    get:
      operationId: list_bank_permissions
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/BankPermissionResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Bank Permissions
  /ext/hindclaw/banks/{bank_id}/permissions/{scope_type}/{scope_id}:
    delete:
      operationId: delete_bank_permission
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_type
        required: true
        schema:
          title: Scope Type
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_id
        required: true
        schema:
          title: Scope Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Bank Permission
    get:
      operationId: get_bank_permission
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_type
        required: true
        schema:
          title: Scope Type
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_id
        required: true
        schema:
          title: Scope Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankPermissionResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Bank Permission
  /ext/hindclaw/banks/{bank_id}/permissions/groups/{group_id}:
    put:
      operationId: upsert_group_permission
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankPermissionRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertConfirmation'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Upsert Group Bank Permission
  /ext/hindclaw/banks/{bank_id}/permissions/users/{user_id}:
    put:
      operationId: upsert_user_permission
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankPermissionRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertConfirmation'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Upsert User Bank Permission
  /ext/hindclaw/banks/{bank_id}/strategies:
    get:
      operationId: list_strategies
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/StrategyScopeResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Strategies
  /ext/hindclaw/banks/{bank_id}/strategies/{scope_type}/{scope_value}:
    delete:
      operationId: delete_strategy
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_type
        required: true
        schema:
          title: Scope Type
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_value
        required: true
        schema:
          title: Scope Value
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Strategy
    put:
      operationId: upsert_strategy
      parameters:
      - explode: false
        in: path
        name: bank_id
        required: true
        schema:
          title: Bank Id
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_type
        required: true
        schema:
          title: Scope Type
          type: string
        style: simple
      - explode: false
        in: path
        name: scope_value
        required: true
        schema:
          title: Scope Value
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategyRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyUpsertConfirmation'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Upsert Strategy
  /ext/hindclaw/users/{user_id}/api-keys:
    get:
      description: List API keys for a user. Keys are masked after creation.
      operationId: list_api_keys
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Api Keys
    post:
      operationId: create_api_key
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Api Key
  /ext/hindclaw/users/{user_id}/api-keys/{key_id}:
    delete:
      operationId: delete_api_key
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Api Key
  /ext/hindclaw/debug/resolve:
    get:
      description: Resolve and return full permissions for a given context.
      operationId: debug_resolve
      parameters:
      - explode: true
        in: query
        name: bank
        required: true
        schema:
          title: Bank
          type: string
        style: form
      - explode: true
        in: query
        name: sender
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: agent
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: channel
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: topic
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedPermissionsResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Debug Resolve
components:
  schemas:
    AddChannelRequest:
      example:
        provider: provider
        sender_id: sender_id
      properties:
        provider:
          title: Provider
          type: string
        sender_id:
          title: Sender Id
          type: string
      required:
      - provider
      - sender_id
      title: AddChannelRequest
    AddMemberRequest:
      example:
        user_id: user_id
      properties:
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      title: AddMemberRequest
    ApiKeyCreateResponse:
      description: API key at creation time — full key shown once.
      example:
        api_key: api_key
        description: description
        id: id
      properties:
        id:
          title: Id
          type: string
        api_key:
          title: Api Key
          type: string
        description:
          nullable: true
          type: string
      required:
      - api_key
      - id
      title: ApiKeyCreateResponse
    ApiKeyResponse:
      description: API key in list view — key is masked after creation.
      example:
        description: description
        id: id
        api_key_prefix: api_key_prefix
      properties:
        id:
          title: Id
          type: string
        api_key_prefix:
          title: Api Key Prefix
          type: string
        description:
          nullable: true
          type: string
      required:
      - api_key_prefix
      - id
      title: ApiKeyResponse
    BankPermissionRequest:
      example:
        recall_tag_groups:
        - key: ""
        - key: ""
        llm_model: llm_model
        exclude_providers:
        - exclude_providers
        - exclude_providers
        recall: true
        retain: true
        retain_roles:
        - retain_roles
        - retain_roles
        llm_provider: llm_provider
        retain_strategy: retain_strategy
        retain_tags:
        - retain_tags
        - retain_tags
        retain_every_n_turns: 0
        recall_budget: recall_budget
        recall_max_tokens: 6
      properties:
        recall:
          nullable: true
          type: boolean
        retain:
          nullable: true
          type: boolean
        retain_roles:
          items:
            type: string
          nullable: true
          type: array
        retain_tags:
          items:
            type: string
          nullable: true
          type: array
        retain_every_n_turns:
          nullable: true
          type: integer
        recall_budget:
          nullable: true
          type: string
        recall_max_tokens:
          nullable: true
          type: integer
        recall_tag_groups:
          items:
            additionalProperties: true
            type: object
          nullable: true
          type: array
        llm_model:
          nullable: true
          type: string
        llm_provider:
          nullable: true
          type: string
        exclude_providers:
          items:
            type: string
          nullable: true
          type: array
        retain_strategy:
          nullable: true
          type: string
      title: BankPermissionRequest
    BankPermissionResponse:
      description: |-
        Bank-level permission entry with scope identifiers.

        Returned by GET /banks/:bank/permissions endpoints.
      example:
        recall_tag_groups:
        - key: ""
        - key: ""
        llm_model: llm_model
        retain: true
        retain_roles:
        - retain_roles
        - retain_roles
        retain_tags:
        - retain_tags
        - retain_tags
        recall_budget: recall_budget
        exclude_providers:
        - exclude_providers
        - exclude_providers
        scope_id: scope_id
        bank_id: bank_id
        recall: true
        llm_provider: llm_provider
        retain_strategy: retain_strategy
        scope_type: scope_type
        retain_every_n_turns: 0
        recall_max_tokens: 6
      properties:
        bank_id:
          title: Bank Id
          type: string
        scope_type:
          title: Scope Type
          type: string
        scope_id:
          title: Scope Id
          type: string
        recall:
          nullable: true
          type: boolean
        retain:
          nullable: true
          type: boolean
        retain_roles:
          items:
            type: string
          nullable: true
          type: array
        retain_tags:
          items:
            type: string
          nullable: true
          type: array
        retain_every_n_turns:
          nullable: true
          type: integer
        recall_budget:
          nullable: true
